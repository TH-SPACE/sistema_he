<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="calRoxo" x1="40" y1="40" x2="200" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#660099"/>
      <stop offset="1" stop-color="#9B26B6"/>
    </linearGradient>
    <linearGradient id="calRelogio" x1="150" y1="150" x2="228" y2="228" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EB3C96"/>
      <stop offset="1" stop-color="#8B1FB0"/>
    </linearGradient>
  </defs>

  <!-- Corpo do calendário -->
  <rect x="36" y="52" width="160" height="152" rx="24" fill="url(#calRoxo)"/>
  <rect x="36" y="52" width="160" height="44" rx="24" fill="#FFFFFF" opacity="0.18"/>

  <!-- Argolas -->
  <g stroke="#FFFFFF" stroke-width="10" stroke-linecap="round">
    <line x1="80" y1="36" x2="80" y2="66"/>
    <line x1="152" y1="36" x2="152" y2="66"/>
  </g>

  <!-- Pontos de dias -->
  <g fill="#FFFFFF" opacity="0.8">
    <circle cx="72" cy="128" r="7"/>
    <circle cx="104" cy="128" r="7"/>
    <circle cx="136" cy="128" r="7"/>
    <circle cx="72" cy="160" r="7"/>
    <circle cx="104" cy="160" r="7"/>
  </g>

  <!-- Relógio sobreposto -->
  <circle cx="184" cy="184" r="52" fill="#FFFFFF"/>
  <circle cx="184" cy="184" r="44" fill="url(#calRelogio)"/>
  <g stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" fill="none">
    <line x1="184" y1="184" x2="184" y2="156"/>
    <line x1="184" y1="184" x2="206" y2="192"/>
  </g>
  <circle cx="184" cy="184" r="6" fill="#FFFFFF"/>
</svg>
